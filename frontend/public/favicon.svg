<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Left lens -->
  <circle cx="20" cy="32" r="12" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Right lens -->
  <circle cx="44" cy="32" r="12" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Bridge -->
  <line x1="32" y1="32" x2="32" y2="32" stroke="#3b82f6" stroke-width="2.5"/>
  <line x1="28" y1="32" x2="36" y2="32" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Left arm -->
